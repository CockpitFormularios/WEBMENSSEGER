<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #dddbd2; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .app { width: 100%; max-width: 1400px; height: 100vh; background: #fff; display: flex; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        .sidebar { width: 420px; min-width: 420px; border-right: 1px solid #e9edef; display: flex; flex-direction: column; background: #fff; }
        .sidebar-header { background: #f0f2f5; padding: 10px 16px; height: 59px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #e9edef; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #dfe5e7; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 500; color: #54656f; flex-shrink: 0; }
        .user-info { flex: 1; min-width: 0; }
        .user-name { font-size: 16px; color: #111b21; font-weight: 500; }
        .btn-refresh { width: 40px; height: 40px; border-radius: 50%; border: none; background: #00a884; color: white; font-size: 18px; cursor: pointer; flex-shrink: 0; }
        .btn-refresh:hover { background: #008f72; }
        .btn-logout { width: 40px; height: 40px; border-radius: 50%; border: none; background: none; font-size: 18px; cursor: pointer; color: #ea0038; flex-shrink: 0; }
        .btn-logout:hover { background: #fce4ec; }
        
        .contact-list { flex: 1; overflow-y: auto; }
        .contact-list::-webkit-scrollbar { width: 6px; }
        .contact-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
        .contact-item { padding: 12px 16px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid #f5f6f6; transition: 0.15s; }
        .contact-item:hover { background: #f5f6f6; }
        .contact-item.active { background: #f0f2f5; }
        .contact-avatar { width: 49px; height: 49px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 19px; font-weight: 600; color: white; flex-shrink: 0; position: relative; }
        .online-dot { width: 12px; height: 12px; background: #25d366; border-radius: 50%; border: 2px solid white; position: absolute; bottom: 1px; right: 1px; }
        .contact-info { flex: 1; min-width: 0; }
        .contact-name { font-size: 16px; color: #111b21; font-weight: 500; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .contact-last { font-size: 13px; color: #667781; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .contact-last.audio { color: #00a884; }
        .contact-time { font-size: 12px; color: #667781; flex-shrink: 0; }
        
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #efeae2; }
        .chat-header { background: #f0f2f5; padding: 10px 16px; height: 59px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #e9edef; }
        .btn-back { width: 35px; height: 35px; border-radius: 50%; border: none; background: none; font-size: 22px; cursor: pointer; color: #54656f; display: none; }
        .btn-back:hover { background: #d9dbdd; }
        .chat-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; color: white; flex-shrink: 0; }
        .chat-header-info { flex: 1; min-width: 0; }
        .chat-header-name { font-size: 16px; font-weight: 500; color: #111b21; }
        .chat-header-status { font-size: 13px; color: #667781; }
        
        .messages-area { flex: 1; overflow-y: auto; padding: 20px 60px; }
        .messages-area::-webkit-scrollbar { width: 6px; }
        .messages-area::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }
        .msg { margin-bottom: 3px; display: flex; flex-direction: column; }
        .msg.sent { align-items: flex-end; }
        .msg.received { align-items: flex-start; }
        .msg-bubble { max-width: 65%; padding: 6px 7px 6px 9px; border-radius: 7.5px; font-size: 14.2px; line-height: 19px; word-wrap: break-word; box-shadow: 0 1px 0.5px rgba(11,20,26,0.13); }
        .msg.sent .msg-bubble { background: #d9fdd3; border-radius: 7.5px 0 7.5px 7.5px; }
        .msg.received .msg-bubble { background: #ffffff; border-radius: 0 7.5px 7.5px 7.5px; }
        .msg-sender { font-size: 12.8px; color: #53bdeb; margin-bottom: 2px; font-weight: 500; }
        .msg-time { font-size: 11px; color: #667781; float: right; margin-left: 8px; margin-top: -8px; }
        .msg.sent .msg-time { color: #8696a0; }
        .msg-text { word-wrap: break-word; white-space: pre-wrap; }
        .msg-text.emoji-large { font-size: 48px; display: block; line-height: 1.2; }
        
        /* Estilo para mensagens de áudio */
        .audio-message {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 250px;
            padding: 8px 12px;
        }
        
        .audio-play-btn {
            width: 37px;
            height: 37px;
            border-radius: 50%;
            border: none;
            background: #00a884;
            color: white;
            font-size: 16px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .msg.received .audio-play-btn {
            background: #00a884;
        }
        
        .audio-waveform {
            flex: 1;
            height: 30px;
            display: flex;
            align-items: flex-end;
            gap: 2px;
        }
        
        .audio-bar {
            width: 3px;
            background: #00a884;
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }
        
        .msg.received .audio-bar {
            background: #00a884;
        }
        
        .msg.sent .audio-bar {
            background: #075e54;
        }
        
        @keyframes wave {
            0%, 100% { height: 5px; }
            50% { height: 25px; }
        }
        
        .audio-duration {
            font-size: 12px;
            color: #667781;
            flex-shrink: 0;
            min-width: 35px;
            text-align: center;
        }
        
        .input-bar { background: #f0f2f5; padding: 5px 10px; display: flex; align-items: center; gap: 5px; position: relative; }
        .input-bar input { flex: 1; padding: 9px 12px; border: none; border-radius: 8px; background: #fff; font-size: 15px; outline: none; color: #111b21; }
        .input-bar input::placeholder { color: #667781; }
        .input-bar button { width: 42px; height: 42px; border-radius: 50%; border: none; background: none; font-size: 22px; cursor: pointer; color: #54656f; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: 0.15s; }
        .input-bar button:hover { background: #d9dbdd; }
        .input-bar button.active { color: #00a884; }
        
        /* Gravação de áudio */
        .audio-recording-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
        }
        
        .audio-recording-overlay.show {
            display: flex;
        }
        
        .recording-box {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .recording-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #ea0038;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(234,0,56,0.4); }
            50% { box-shadow: 0 0 0 20px rgba(234,0,56,0); }
        }
        
        .recording-timer {
            font-size: 48px;
            font-weight: 300;
            color: #111b21;
            margin-bottom: 10px;
        }
        
        .recording-text {
            font-size: 14px;
            color: #667781;
            margin-bottom: 20px;
        }
        
        .recording-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .recording-btn {
            padding: 12px 30px;
            border-radius: 25px;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .recording-btn.cancel {
            background: #f0f2f5;
            color: #111b21;
        }
        
        .recording-btn.send {
            background: #00a884;
            color: white;
        }
        
        .recording-btn:hover {
            transform: scale(1.05);
        }
        
        /* Emoji picker */
        .emoji-picker {
            position: absolute;
            bottom: 60px;
            left: 10px;
            width: 350px;
            max-height: 350px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.2);
            display: none;
            flex-direction: column;
            z-index: 100;
            overflow: hidden;
        }
        
        .emoji-picker.show { display: flex; }
        
        .emoji-picker-header {
            display: flex;
            border-bottom: 1px solid #e9edef;
            background: #f0f2f5;
        }
        
        .emoji-category {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 18px;
            transition: 0.2s;
            border-bottom: 3px solid transparent;
        }
        
        .emoji-category:hover { background: #e8eaed; }
        .emoji-category.active { border-bottom-color: #00a884; }
        
        .emoji-picker-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
        }
        
        .emoji-picker-body::-webkit-scrollbar { width: 4px; }
        .emoji-picker-body::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
        
        .emoji-item {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.15s;
            user-select: none;
        }
        
        .emoji-item:hover { background: #f0f2f5; transform: scale(1.2); }
        .emoji-item:active { transform: scale(0.9); }
        
        .welcome-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f0f2f5; border-bottom: 6px solid #25d366; }
        .welcome-icon { width: 200px; height: 200px; border-radius: 50%; background: linear-gradient(135deg, #25d366, #00a884); display: flex; align-items: center; justify-content: center; font-size: 100px; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,168,132,0.3); }
        .welcome-title { font-size: 32px; font-weight: 300; color: #41525d; margin-bottom: 15px; }
        .welcome-text { font-size: 14px; color: #667781; text-align: center; line-height: 22px; }
        
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; color: #667781; padding: 40px; }
        .empty-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.8; }
        .empty-title { font-size: 18px; color: #111b21; margin-bottom: 10px; font-weight: 500; }
        .empty-text { font-size: 14px; margin-bottom: 20px; line-height: 20px; }
        .empty-btn { background: #00a884; color: white; border: none; padding: 10px 24px; border-radius: 20px; font-size: 14px; font-weight: 500; cursor: pointer; }
        .empty-btn:hover { background: #008f72; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .modal-box { background: #fff; padding: 40px; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal-box h2 { font-size: 22px; color: #111b21; margin-bottom: 25px; font-weight: 400; text-align: center; }
        .modal-box input { width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; outline: none; margin-bottom: 20px; color: #111b21; }
        .modal-box input:focus { border-color: #00a884; }
        .modal-box button { width: 100%; padding: 14px; background: #00a884; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; }
        .modal-box button:hover { background: #008f72; }
        
        @media (max-width: 768px) {
            .sidebar { width: 100%; min-width: 100%; }
            .main-chat { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100; }
            .main-chat.active { display: flex; }
            .btn-back { display: block; }
            .messages-area { padding: 15px; }
            .msg-bubble { max-width: 85%; }
            .emoji-picker { width: 300px; left: 5px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="avatar" id="myAvatar">👤</div>
                <div class="user-info"><div class="user-name" id="myName">WhatsApp</div></div>
                <button class="btn-refresh" onclick="refreshContacts()">🔄</button>
                <button class="btn-logout" onclick="logout()">⏻</button>
            </div>
            <div class="contact-list" id="contactList">
                <div class="empty-state">
                    <div class="empty-icon">💬</div>
                    <div class="empty-title">WhatsApp Web</div>
                    <div class="empty-text">Clique em atualizar para<br>encontrar contatos online</div>
                    <button class="empty-btn" onclick="refreshContacts()">🔄 Buscar Contatos</button>
                </div>
            </div>
        </div>

        <div class="main-chat" id="mainChat">
            <div class="chat-header" id="chatHeader" style="display:none;">
                <button class="btn-back" onclick="closeChat()">←</button>
                <div class="chat-avatar" id="chatAvatar">👤</div>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="chatName">Nome</div>
                    <div class="chat-header-status" id="chatStatus">online</div>
                </div>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="input-bar" id="inputBar" style="display:none;">
                <button id="emojiBtn" onclick="toggleEmojiPicker()">😀</button>
                <button id="micBtn" onclick="startRecording()" title="Gravar áudio">🎤</button>
                <input type="text" id="msgInput" placeholder="Digite uma mensagem" maxlength="1000" autocomplete="off">
                <button class="send-btn" id="sendBtn" onclick="sendMsg()">➤</button>
                
                <div class="emoji-picker" id="emojiPicker">
                    <div class="emoji-picker-header">
                        <div class="emoji-category active" onclick="switchEmojiCategory(this, 'smileys')">😀</div>
                        <div class="emoji-category" onclick="switchEmojiCategory(this, 'gestures')">👋</div>
                        <div class="emoji-category" onclick="switchEmojiCategory(this, 'hearts')">❤️</div>
                        <div class="emoji-category" onclick="switchEmojiCategory(this, 'animals')">🐱</div>
                        <div class="emoji-category" onclick="switchEmojiCategory(this, 'food')">🍕</div>
                    </div>
                    <div class="emoji-picker-body" id="emojiBody"></div>
                </div>
            </div>
        </div>

        <div class="welcome-screen" id="welcomeScreen">
            <div class="welcome-icon">💬</div>
            <div class="welcome-title">WhatsApp Web</div>
            <div class="welcome-text">Envie mensagens, emojis e áudios em tempo real.</div>
        </div>
    </div>

    <!-- Gravação de áudio overlay -->
    <div class="audio-recording-overlay" id="audioOverlay">
        <div class="recording-box">
            <div class="recording-icon">🎙️</div>
            <div class="recording-timer" id="recordingTimer">00:00</div>
            <div class="recording-text">Gravando áudio...</div>
            <div class="recording-actions">
                <button class="recording-btn cancel" onclick="cancelRecording()">Cancelar</button>
                <button class="recording-btn send" onclick="stopRecording()">Enviar ✓</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="loginModal">
        <div class="modal-box">
            <h2>👋 Bem-vindo</h2>
            <input type="text" id="nameInput" placeholder="Digite seu nome" maxlength="25" autocomplete="off">
            <button onclick="entrar()">Entrar no WhatsApp</button>
        </div>
    </div>

    <script>
        // ==================== CONFIGURAÇÃO ====================
        const sb = window.supabase.createClient(
            'https://fqbxhkcdefwsuefifygk.supabase.co',
            'sb_publishable_jC8Ntyx8QD2FHkP8Bqa63A_sLljd1Fj'
        );

        let currentUser = null;
        let activeChat = null;
        let presenceChannel = null;
        let messageChannel = null;
        let onlineUsers = {};
        let lastMsgs = {};
        let currentEmojiCategory = 'smileys';
        
        // Áudio
        let mediaRecorder = null;
        let audioChunks = [];
        let recordingInterval = null;
        let recordingSeconds = 0;

        // ==================== EMOJIS ====================
        const emojiData = {
            smileys: ['😀','😃','😄','😁','😅','😂','🤣','😊','😇','🙂','😉','😌','😍','🥰','😘','😗','😋','😛','😜','🤪','😝','🤑','🤗','🤭','🤫','🤔','🤐','🤨','😐','😑','😶','😏','😒','🙄','😬','😮','🤥','😌','😔','😪','🤤','😴','😷','🤒','🤕','🤢','🤮','🥴','😵','🤯','🥳','🥺','😢','😭','😤','😠','😡','🤬','💀','☠️','💩','🤡','👹','👺','👻','👽','👾','🤖'],
            gestures: ['👋','🤚','✋','🖐️','👌','🤌','🤏','✌️','🤞','🤟','🤘','🤙','👈','👉','👆','👇','☝️','👍','👎','✊','👊','🤛','🤜','👏','🙌','👐','🤲','🤝','🙏','✍️','💅','🤳','💪','🦵','🦶','👂','👃','🧠','🦷','🦴','👀','👁️','👅','👄'],
            hearts: ['❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💔','❣️','💕','💞','💓','💗','💖','💘','💝','💟','♥️','💌','💋','💯','🔥','⭐','🌟','✨','💫','🎉','🎊','🎈','💐','🌸','💮','🌹','🌺','🌻','🌼','🌷','💎','🎀','🏆','🥇','🥈','🥉','💍','👑'],
            animals: ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🙈','🙉','🙊','🐒','🐔','🐧','🐦','🐤','🐣','🐥','🦆','🦅','🦉','🦇','🐺','🐗','🐴','🦄','🐝','🐛','🦋','🐌','🐞','🐜','🦟','🦗','🕷️','🦂','🐢','🐍','🦎','🦖','🦕','🐙','🦑','🦐','🐠','🐟','🐡','🦈','🐳','🐋','🐊','🐆','🐅','🐃','🐂','🐄','🦌','🐪','🐫','🦒','🐘','🦏','🦛'],
            food: ['🍏','🍎','🍐','🍊','🍋','🍌','🍉','🍇','🍓','🫐','🍈','🍒','🍑','🥭','🍍','🥥','🥝','🍅','🍆','🥑','🥦','🥬','🥒','🌶️','🫑','🌽','🥕','🧄','🧅','🥔','🍠','🥐','🍞','🥖','🥨','🧀','🥚','🍳','🧈','🥞','🧇','🥓','🥩','🍗','🍖','🌭','🍔','🍟','🍕','🫓','🥪','🥙','🧆','🌮','🌯','🫔','🥗','🥘','🫕','🥫','🍝','🍜','🍲','🍛','🍣','🍱','🥟','🦪','🍤','🍙','🍚','🍘','🍥','🥠','🍢','🍡','🍧','🍨','🍦','🥧','🧁','🍰','🎂','🍮','🍭','🍬','🍫','🍿','🍩','🍪','🌰','🥜','🍯','🥛','🍼','☕','🍵','🧃','🥤','🍶','🍺','🍻','🥂','🍷','🥃','🍸','🍹','🧉','🍾','🧊']
        };

        function renderEmojiGrid(category) {
            const body = document.getElementById('emojiBody');
            const emojis = emojiData[category] || emojiData.smileys;
            body.innerHTML = emojis.map(emoji => 
                `<div class="emoji-item" onclick="insertEmoji('${emoji}')" title="${emoji}">${emoji}</div>`
            ).join('');
        }

        function toggleEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            const btn = document.getElementById('emojiBtn');
            if (picker.classList.contains('show')) {
                picker.classList.remove('show');
                btn.style.color = '#54656f';
            } else {
                picker.classList.add('show');
                btn.style.color = '#00a884';
                renderEmojiGrid(currentEmojiCategory);
            }
        }

        function switchEmojiCategory(element, category) {
            document.querySelectorAll('.emoji-category').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            currentEmojiCategory = category;
            renderEmojiGrid(category);
        }

        function insertEmoji(emoji) {
            const input = document.getElementById('msgInput');
            const cursorPos = input.selectionStart;
            const textBefore = input.value.substring(0, cursorPos);
            const textAfter = input.value.substring(cursorPos);
            input.value = textBefore + emoji + textAfter;
            input.focus();
            input.selectionStart = cursorPos + emoji.length;
            input.selectionEnd = cursorPos + emoji.length;
            updateSendBtn();
        }

        document.addEventListener('click', function(e) {
            const picker = document.getElementById('emojiPicker');
            const emojiBtn = document.getElementById('emojiBtn');
            if (!picker.contains(e.target) && e.target !== emojiBtn) {
                picker.classList.remove('show');
                if (emojiBtn) emojiBtn.style.color = '#54656f';
            }
        });

        // ==================== GRAVAÇÃO DE ÁUDIO ====================
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                audioChunks = [];
                recordingSeconds = 0;
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                
                mediaRecorder.start(100);
                
                // Mostrar overlay
                document.getElementById('audioOverlay').classList.add('show');
                document.getElementById('recordingTimer').textContent = '00:00';
                
                // Iniciar timer
                recordingInterval = setInterval(() => {
                    recordingSeconds++;
                    const mins = Math.floor(recordingSeconds / 60).toString().padStart(2, '0');
                    const secs = (recordingSeconds % 60).toString().padStart(2, '0');
                    document.getElementById('recordingTimer').textContent = mins + ':' + secs;
                }, 1000);
                
            } catch (error) {
                console.error('Erro ao gravar:', error);
                alert('Não foi possível acessar o microfone. Verifique as permissões.');
            }
        }

        function cancelRecording() {
            stopMediaRecorder();
            document.getElementById('audioOverlay').classList.remove('show');
        }

        async function stopRecording() {
            if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
            
            stopMediaRecorder();
            document.getElementById('audioOverlay').classList.remove('show');
            
            // Criar blob do áudio
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            
            // Converter para base64 para enviar
            const reader = new FileReader();
            reader.onload = function() {
                const base64Audio = reader.result;
                sendAudioMessage(base64Audio, recordingSeconds);
            };
            reader.readAsDataURL(audioBlob);
        }

        function stopMediaRecorder() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
            if (recordingInterval) {
                clearInterval(recordingInterval);
                recordingInterval = null;
            }
        }

        function sendAudioMessage(audioData, duration) {
            if (!activeChat) return;
            
            const msg = {
                id: 'msg_' + Date.now(),
                from: currentUser.id,
                fromName: currentUser.name,
                to: activeChat.id,
                type: 'audio',
                audioData: audioData,
                duration: duration,
                timestamp: Date.now()
            };
            
            displayMessage(msg, true);
            saveMessage(msg);
            
            lastMsgs[activeChat.id] = { text: '🎤 Mensagem de áudio', timestamp: msg.timestamp, isAudio: true };
            
            if (messageChannel) {
                messageChannel.send({
                    type: 'broadcast',
                    event: 'msg',
                    payload: msg
                }).catch(err => console.error('Erro ao enviar áudio:', err));
            }
            
            renderContacts();
        }

        function displayAudioMessage(msg, sent) {
            const container = document.getElementById('messagesArea');
            const div = document.createElement('div');
            div.className = 'msg ' + (sent ? 'sent' : 'received');
            
            const time = formatTime(msg.timestamp);
            const mins = Math.floor(msg.duration / 60);
            const secs = msg.duration % 60;
            const durationStr = mins > 0 ? mins + ':' + secs.toString().padStart(2, '0') : '0:' + secs.toString().padStart(2, '0');
            
            div.innerHTML = `
                ${!sent ? '<div class="msg-sender">~' + esc(msg.fromName) + '</div>' : ''}
                <div class="msg-bubble">
                    <div class="audio-message">
                        <button class="audio-play-btn" onclick="playAudio(this, '${esc(msg.audioData)}')">▶</button>
                        <div class="audio-waveform">
                            ${Array(12).fill(0).map((_, i) => 
                                `<div class="audio-bar" style="animation-delay:${i * 0.1}s; height:${Math.random() * 25 + 5}px;"></div>`
                            ).join('')}
                        </div>
                        <span class="audio-duration">${durationStr}</span>
                    </div>
                    <span class="msg-time">${time}</span>
                </div>
            `;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function playAudio(button, audioData) {
            const audio = new Audio(audioData);
            
            audio.onplay = () => {
                button.textContent = '⏸';
            };
            
            audio.onpause = () => {
                button.textContent = '▶';
            };
            
            audio.onended = () => {
                button.textContent = '▶';
            };
            
            if (!audio.paused) {
                audio.pause();
            } else {
                // Parar outros áudios
                document.querySelectorAll('audio').forEach(a => a.pause());
                audio.play();
            }
        }

        // ==================== LOGIN ====================
        function entrar() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name || name.length < 2) return alert('Digite um nome com pelo menos 2 caracteres');

            currentUser = { id: 'u_' + Date.now(), name: name, color: getColor() };
            localStorage.setItem('wp_user', JSON.stringify(currentUser));
            
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('myName').textContent = name;
            document.getElementById('myAvatar').textContent = getInitials(name);
            document.getElementById('myAvatar').style.background = currentUser.color;
            
            connectPresence();
            setTimeout(() => announcePresence(), 500);
            setTimeout(() => requestUsers(), 1500);
        }

        function logout() {
            stopMediaRecorder();
            if (presenceChannel) { sb.removeChannel(presenceChannel); presenceChannel = null; }
            if (messageChannel) { sb.removeChannel(messageChannel); messageChannel = null; }
            currentUser = null; activeChat = null; onlineUsers = {}; lastMsgs = {};
            localStorage.removeItem('wp_user');
            document.getElementById('loginModal').style.display = 'flex';
            document.getElementById('nameInput').value = '';
            document.getElementById('myName').textContent = 'WhatsApp';
            document.getElementById('myAvatar').textContent = '👤';
            document.getElementById('myAvatar').style.background = '#dfe5e7';
            closeChat();
            showEmptyContacts();
        }

        // ==================== PRESENÇA ====================
        function connectPresence() {
            if (presenceChannel) sb.removeChannel(presenceChannel);
            presenceChannel = sb.channel('presence_v7', { config: { broadcast: { self: true } } });
            presenceChannel
                .on('broadcast', { event: 'user_online' }, (payload) => {
                    const user = payload.payload;
                    if (user.id !== currentUser?.id) { onlineUsers[user.id] = user; renderContacts(); }
                })
                .on('broadcast', { event: 'request_users' }, () => { if (currentUser) announcePresence(); })
                .subscribe((status) => { if (status === 'SUBSCRIBED') requestUsers(); });
        }

        function announcePresence() {
            if (!currentUser || !presenceChannel) return;
            presenceChannel.send({
                type: 'broadcast', event: 'user_online',
                payload: { id: currentUser.id, name: currentUser.name, color: currentUser.color, timestamp: Date.now() }
            });
        }

        function requestUsers() {
            if (!presenceChannel) return;
            presenceChannel.send({ type: 'broadcast', event: 'request_users', payload: {} });
            setTimeout(() => renderContacts(), 2000);
        }

        function refreshContacts() {
            document.getElementById('contactList').innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-title">Atualizando...</div></div>';
            announcePresence(); requestUsers();
        }

        function renderContacts() {
            const container = document.getElementById('contactList');
            const users = Object.values(onlineUsers).filter(u => u.id !== currentUser?.id);
            if (users.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">Nenhum contato online</div><div class="empty-text">Abra em outro navegador e faça login</div><button class="empty-btn" onclick="refreshContacts()">🔄 Atualizar</button></div>';
                return;
            }
            container.innerHTML = users.map(user => {
                const last = lastMsgs[user.id];
                return `
                    <div class="contact-item ${activeChat?.id === user.id ? 'active' : ''}" onclick="openChat('${user.id}', '${esc(user.name)}', '${esc(user.color || '')}')">
                        <div class="contact-avatar" style="background:${user.color || 'linear-gradient(135deg, #667eea, #764ba2)'};">
                            ${getInitials(user.name)}<div class="online-dot"></div>
                        </div>
                        <div class="contact-info">
                            <div class="contact-name">${esc(user.name)}</div>
                            <div class="contact-last ${last?.isAudio ? 'audio' : ''}">${last ? last.text.substring(0, 40) : 'Online agora'}</div>
                        </div>
                        <div class="contact-time">${last ? formatTime(last.timestamp) : 'agora'}</div>
                    </div>`;
            }).join('');
        }

        function showEmptyContacts() {
            document.getElementById('contactList').innerHTML = '<div class="empty-state"><div class="empty-icon">💬</div><div class="empty-title">WhatsApp Web</div><div class="empty-text">Clique em atualizar para<br>encontrar contatos online</div><button class="empty-btn" onclick="refreshContacts()">🔄 Buscar Contatos</button></div>';
        }

        // ==================== CHAT ====================
        function openChat(userId, userName, userColor) {
            if (messageChannel) { sb.removeChannel(messageChannel); messageChannel = null; }
            activeChat = { id: userId, name: userName, color: userColor };
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('messagesArea').style.display = 'block';
            document.getElementById('inputBar').style.display = 'flex';
            document.getElementById('chatName').textContent = userName;
            document.getElementById('chatStatus').textContent = 'online';
            document.getElementById('chatAvatar').textContent = getInitials(userName);
            document.getElementById('chatAvatar').style.background = userColor || 'linear-gradient(135deg, #667eea, #764ba2)';
            document.getElementById('messagesArea').innerHTML = '';
            createMessageChannel(userId);
            loadMessages();
            if (window.innerWidth <= 768) document.getElementById('mainChat').classList.add('active');
            renderContacts();
        }

        function closeChat() {
            if (messageChannel) { sb.removeChannel(messageChannel); messageChannel = null; }
            activeChat = null;
            document.getElementById('welcomeScreen').style.display = 'flex';
            document.getElementById('chatHeader').style.display = 'none';
            document.getElementById('messagesArea').style.display = 'none';
            document.getElementById('inputBar').style.display = 'none';
            document.getElementById('messagesArea').innerHTML = '';
            if (window.innerWidth <= 768) document.getElementById('mainChat').classList.remove('active');
            renderContacts();
        }

        function createMessageChannel(userId) {
            const channelName = 'chat_' + [currentUser.id, userId].sort().join('_');
            messageChannel = sb.channel(channelName);
            messageChannel.on('broadcast', { event: 'msg' }, (payload) => {
                const msg = payload.payload;
                saveMessage(msg);
                const otherId = msg.from === currentUser.id ? msg.to : msg.from;
                lastMsgs[otherId] = { 
                    text: msg.type === 'audio' ? '🎤 Mensagem de áudio' : msg.text, 
                    timestamp: msg.timestamp, 
                    isAudio: msg.type === 'audio' 
                };
                if (activeChat && msg.from === activeChat.id) {
                    if (msg.type === 'audio') {
                        displayAudioMessage(msg, false);
                    } else {
                        displayMessage(msg, false);
                    }
                }
                renderContacts();
            }).subscribe();
        }

        function sendMsg() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !activeChat) return;
            
            const msg = {
                id: 'msg_' + Date.now(),
                from: currentUser.id,
                fromName: currentUser.name,
                to: activeChat.id,
                type: 'text',
                text: text,
                timestamp: Date.now()
            };
            
            displayMessage(msg, true);
            saveMessage(msg);
            lastMsgs[activeChat.id] = { text: text, timestamp: msg.timestamp };
            input.value = '';
            updateSendBtn();
            
            if (messageChannel) {
                messageChannel.send({ type: 'broadcast', event: 'msg', payload: msg });
            }
            renderContacts();
        }

        function displayMessage(msg, sent) {
            const container = document.getElementById('messagesArea');
            const div = document.createElement('div');
            div.className = 'msg ' + (sent ? 'sent' : 'received');
            const time = formatTime(msg.timestamp);
            const isOnlyEmoji = /^[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\u{1F300}-\u{1F5FF}\u{1F600}-\u{1F64F}\u{1F680}-\u{1F6FF}\u{1F900}-\u{1F9FF}\u{200D}\u{FE0F}\s]+$/u.test(msg.text.trim()) && msg.text.trim().length <= 3;
            
            div.innerHTML = `
                ${!sent ? '<div class="msg-sender">~' + esc(msg.fromName) + '</div>' : ''}
                <div class="msg-bubble">
                    <div class="msg-text ${isOnlyEmoji ? 'emoji-large' : ''}">${esc(msg.text)}</div>
                    <span class="msg-time">${time}</span>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function saveMessage(msg) {
            const key = 'wp_msgs_' + [msg.from, msg.to].sort().join('_');
            let msgs = JSON.parse(localStorage.getItem(key) || '[]');
            if (!msgs.find(m => m.id === msg.id)) {
                msgs.push(msg);
                if (msgs.length > 300) msgs = msgs.slice(-300);
                localStorage.setItem(key, JSON.stringify(msgs));
            }
        }

        function loadMessages() {
            if (!activeChat) return;
            const key = 'wp_msgs_' + [currentUser.id, activeChat.id].sort().join('_');
            const msgs = JSON.parse(localStorage.getItem(key) || '[]');
            document.getElementById('messagesArea').innerHTML = '';
            msgs.forEach(msg => {
                if (msg.type === 'audio') {
                    displayAudioMessage(msg, msg.from === currentUser.id);
                } else {
                    displayMessage(msg, msg.from === currentUser.id);
                }
            });
        }

        // ==================== UTILITÁRIOS ====================
        function getInitials(name) { return name.split(' ').map(w => w[0]).filter(Boolean).slice(0, 2).join('').toUpperCase() || '?'; }
        function getColor() { const c = ['linear-gradient(135deg, #667eea, #764ba2)','linear-gradient(135deg, #f093fb, #f5576c)','linear-gradient(135deg, #4facfe, #00f2fe)','linear-gradient(135deg, #43e97b, #38f9d7)']; return c[Math.floor(Math.random() * c.length)]; }
        function formatTime(ts) { const d = new Date(ts); return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0'); }
        function esc(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function updateSendBtn() { const b = document.getElementById('sendBtn'); const i = document.getElementById('msgInput'); if(i.value.trim()) { b.textContent = '➤'; b.classList.add('active'); } else { b.textContent = '➤'; b.classList.remove('active'); } }

        // ==================== EVENTOS ====================
        document.getElementById('msgInput').addEventListener('input', updateSendBtn);
        document.getElementById('msgInput').addEventListener('keypress', function(e) { if(e.key === 'Enter') sendMsg(); });
        document.getElementById('nameInput').addEventListener('keypress', function(e) { if(e.key === 'Enter') entrar(); });
        setInterval(() => { if(currentUser) announcePresence(); }, 25000);

        window.addEventListener('load', () => {
            const saved = localStorage.getItem('wp_user');
            if(saved) {
                try {
                    currentUser = JSON.parse(saved);
                    document.getElementById('loginModal').style.display = 'none';
                    document.getElementById('myName').textContent = currentUser.name;
                    document.getElementById('myAvatar').textContent = getInitials(currentUser.name);
                    document.getElementById('myAvatar').style.background = currentUser.color;
                    connectPresence();
                    setTimeout(() => announcePresence(), 500);
                    setTimeout(() => requestUsers(), 1500);
                } catch(e) { localStorage.removeItem('wp_user'); }
            }
        });
    </script>
</body>
</html>
