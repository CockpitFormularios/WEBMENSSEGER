<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #dddbd2;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app {
            width: 100%;
            max-width: 1400px;
            height: 100vh;
            background: #fff;
            display: flex;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .sidebar {
            width: 420px;
            border-right: 1px solid #e9edef;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .sidebar-header {
            background: #f0f2f5;
            padding: 10px 16px;
            height: 60px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #e9edef;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #dfe5e7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #54656f;
        }

        .sidebar-header-info {
            flex: 1;
            margin-left: 15px;
        }

        .sidebar-header-name {
            font-size: 16px;
            color: #111b21;
            font-weight: 500;
        }

        .refresh-btn {
            background: #00a884;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }

        .refresh-btn:hover { background: #008f72; }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-list::-webkit-scrollbar { width: 6px; }
        .chat-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

        .chat-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            border-bottom: 1px solid #f0f2f5;
            transition: 0.2s;
        }

        .chat-item:hover { background: #f0f2f5; }
        .chat-item.active { background: #f0f2f5; }

        .user-avatar {
            width: 49px;
            height: 49px;
            border-radius: 50%;
            background: #dfe5e7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #54656f;
            flex-shrink: 0;
            position: relative;
        }

        .online-dot {
            width: 12px;
            height: 12px;
            background: #25d366;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            bottom: 0;
            right: 0;
        }

        .user-info { flex: 1; min-width: 0; }
        .user-name { font-size: 16px; color: #111b21; margin-bottom: 3px; }
        .user-status { font-size: 13px; color: #667781; }
        .user-time { font-size: 12px; color: #667781; flex-shrink: 0; }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #efeae2;
        }

        .chat-header {
            background: #f0f2f5;
            padding: 10px 16px;
            height: 60px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #e9edef;
        }

        .chat-header .header-info { flex: 1; }
        .chat-header .header-name { font-size: 16px; font-weight: 500; color: #111b21; }
        .chat-header .header-status { font-size: 13px; color: #667781; }

        .chat-header button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: none;
            font-size: 20px;
            cursor: pointer;
            color: #54656f;
        }

        .chat-header button:hover { background: #d9dbdd; }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 60px;
            background: #efeae2;
        }

        .messages-area::-webkit-scrollbar { width: 6px; }
        .messages-area::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

        .message {
            margin-bottom: 3px;
            display: flex;
            flex-direction: column;
        }

        .message.sent { align-items: flex-end; }
        .message.received { align-items: flex-start; }

        .message-bubble {
            max-width: 65%;
            padding: 6px 8px 6px 9px;
            border-radius: 7.5px;
            font-size: 14.2px;
            line-height: 19px;
            word-wrap: break-word;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
        }

        .message.sent .message-bubble {
            background: #d9fdd3;
            border-radius: 7.5px 0 7.5px 7.5px;
        }

        .message.received .message-bubble {
            background: #ffffff;
            border-radius: 0 7.5px 7.5px 7.5px;
        }

        .message-sender {
            font-size: 12.8px;
            color: #53bdeb;
            margin-bottom: 2px;
            font-weight: 500;
        }

        .message-time {
            font-size: 11px;
            color: #667781;
            float: right;
            margin-left: 8px;
            margin-top: -8px;
        }

        .message.sent .message-time { color: #8696a0; }

        .input-area {
            background: #f0f2f5;
            padding: 5px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-area input {
            flex: 1;
            padding: 9px 12px;
            border: none;
            border-radius: 8px;
            background: #fff;
            font-size: 15px;
            outline: none;
            color: #111b21;
        }

        .input-area input::placeholder { color: #667781; }

        .input-area button {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: none;
            font-size: 24px;
            cursor: pointer;
            color: #54656f;
        }

        .input-area button:hover { background: #d9dbdd; }

        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f0f2f5;
        }

        .welcome-screen .icon { font-size: 80px; margin-bottom: 20px; }
        .welcome-screen h2 { font-size: 32px; font-weight: 300; color: #41525d; margin-bottom: 15px; }
        .welcome-screen p { font-size: 14px; color: #667781; text-align: center; line-height: 20px; }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: #667781;
            padding: 30px;
        }

        .empty-state .icon { font-size: 60px; margin-bottom: 20px; }
        .empty-state h3 { font-size: 18px; color: #111b21; margin-bottom: 10px; }
        .empty-state p { font-size: 14px; margin-bottom: 20px; }

        .empty-state button, .login-modal button {
            background: #00a884;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }

        .login-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-modal {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .login-modal h3 {
            font-size: 20px;
            color: #111b21;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .login-modal input {
            width: 100%;
            padding: 12px;
            border: none;
            border-bottom: 2px solid #00a884;
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="avatar" id="meuAvatar">👤</div>
                <div class="sidebar-header-info">
                    <div class="sidebar-header-name" id="meuNome">WhatsApp</div>
                </div>
                <button class="refresh-btn" onclick="atualizarLista()">🔄 Atualizar</button>
            </div>

            <div class="chat-list" id="listaConversas">
                <div class="empty-state">
                    <div class="icon">💬</div>
                    <h3>WhatsApp Web</h3>
                    <p>Clique em "Atualizar" para ver contatos online</p>
                    <button onclick="atualizarLista()">🔄 Atualizar</button>
                </div>
            </div>
        </div>

        <div class="main-chat" id="mainChat">
            <div class="chat-header" id="chatHeader" style="display:none;">
                <div class="user-avatar" id="chatAvatar" style="width:40px;height:40px;font-size:16px;">👤</div>
                <div class="header-info">
                    <div class="header-name" id="chatName">Nome</div>
                    <div class="header-status" id="chatStatus">online</div>
                </div>
                <button onclick="fecharChat()">←</button>
            </div>

            <div class="messages-area" id="messagesArea"></div>

            <div class="input-area" id="inputArea" style="display:none;">
                <button>😀</button>
                <input type="text" id="msgInput" placeholder="Digite uma mensagem" maxlength="1000">
                <button id="sendBtn" onclick="enviarMensagem()">🎤</button>
            </div>
        </div>

        <div class="welcome-screen" id="welcomeScreen">
            <div class="icon">💬</div>
            <h2>WhatsApp Web</h2>
            <p>Envie e receba mensagens em tempo real.<br>As mensagens não são armazenadas no servidor.</p>
        </div>
    </div>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-modal">
            <h3>Entre com seu nome</h3>
            <input type="text" id="nameInput" placeholder="Seu nome" maxlength="25">
            <button onclick="fazerLogin()">Entrar</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://fqbxhkcdefwsuefifygk.supabase.co';
        const SB_KEY = 'sb_publishable_jC8Ntyx8QD2FHkP8Bqa63A_sLljd1Fj';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let eu = null;
        let conversaAtual = null;
        let canalPresenca = null;
        let canaisMensagens = {};
        let usuariosOnline = {};
        let ultimaMensagem = {};

        // ============ PRESENÇA ============
        function criarCanalPresenca() {
            if (canalPresenca) {
                sb.removeChannel(canalPresenca);
            }
            
            canalPresenca = sb.channel('presenca_global_v4');
            
            canalPresenca
                .on('broadcast', { event: 'user_online' }, (payload) => {
                    const user = payload.payload;
                    if (user.id !== eu?.id) {
                        usuariosOnline[user.id] = user;
                        renderizarLista();
                    }
                })
                .on('broadcast', { event: 'ping_all' }, () => {
                    if (eu) anunciarOnline();
                })
                .subscribe((status) => {
                    if (status === 'SUBSCRIBED') {
                        console.log('✅ Presença conectada');
                        canalPresenca.send({
                            type: 'broadcast',
                            event: 'ping_all',
                            payload: {}
                        });
                    }
                });
        }

        function anunciarOnline() {
            if (!eu || !canalPresenca) return;
            
            canalPresenca.send({
                type: 'broadcast',
                event: 'user_online',
                payload: { id: eu.id, nome: eu.nome, time: Date.now() }
            });
        }

        // ============ MENSAGENS ============
        function criarCanalMensagens(userId) {
            if (canaisMensagens[userId]) {
                return; // Já existe
            }
            
            const nomeCanal = 'chat_msg_' + [eu.id, userId].sort().join('_');
            console.log('📡 Criando canal:', nomeCanal);
            
            const canal = sb.channel(nomeCanal);
            
            canal.on('broadcast', { event: 'msg' }, (payload) => {
                console.log('📨 Mensagem recebida:', payload.payload);
                const msg = payload.payload;
                
                // Mostrar se for do chat atual
                if (conversaAtual && (msg.de === conversaAtual.id || msg.para === conversaAtual.id)) {
                    mostrarMensagem(msg, msg.de === eu.id);
                }
                
                // Salvar sempre
                salvarMensagem(msg);
                
                // Atualizar última mensagem
                const outro = msg.de === eu.id ? msg.para : msg.de;
                ultimaMensagem[outro] = { texto: msg.texto, time: msg.hora };
                
                if (!conversaAtual || conversaAtual.id !== outro) {
                    renderizarLista();
                }
            }).subscribe((status) => {
                if (status === 'SUBSCRIBED') {
                    console.log('✅ Canal de mensagens conectado:', nomeCanal);
                }
            });
            
            canaisMensagens[userId] = canal;
        }

        async function enviarMensagem() {
            const input = document.getElementById('msgInput');
            const texto = input.value.trim();
            
            if (!texto || !conversaAtual) return;
            
            const msg = {
                id: 'm_' + Date.now(),
                de: eu.id,
                deNome: eu.nome,
                para: conversaAtual.id,
                texto: texto,
                hora: Date.now()
            };
            
            console.log('📤 Enviando mensagem:', texto);
            
            // Mostrar na tela imediatamente
            mostrarMensagem(msg, true);
            salvarMensagem(msg);
            ultimaMensagem[conversaAtual.id] = { texto: texto, time: msg.hora };
            input.value = '';
            input.focus();
            
            // Enviar via broadcast
            try {
                const nomeCanal = 'chat_msg_' + [eu.id, conversaAtual.id].sort().join('_');
                
                // Criar canal temporário para enviar
                const ch = sb.channel(nomeCanal);
                
                ch.subscribe(async (status) => {
                    if (status === 'SUBSCRIBED') {
                        await ch.send({
                            type: 'broadcast',
                            event: 'msg',
                            payload: msg
                        });
                        console.log('✅ Mensagem enviada via broadcast');
                        setTimeout(() => {
                            sb.removeChannel(ch);
                        }, 500);
                    }
                });
                
            } catch(e) {
                console.error('❌ Erro ao enviar:', e);
            }
        }

        function mostrarMensagem(msg, enviada) {
            const container = document.getElementById('messagesArea');
            const div = document.createElement('div');
            div.className = 'message ' + (enviada ? 'sent' : 'received');
            
            const hora = new Date(msg.hora).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            
            div.innerHTML = `
                ${!enviada ? `<div class="message-sender">~${msg.deNome}</div>` : ''}
                <div class="message-bubble">
                    ${msg.texto.replace(/</g, '&lt;').replace(/>/g, '&gt;')}
                    <span class="message-time">${hora}</span>
                </div>
            `;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function salvarMensagem(msg) {
            const chave = 'wp_msgs_' + [msg.de, msg.para].sort().join('_');
            let msgs = JSON.parse(localStorage.getItem(chave) || '[]');
            if (!msgs.find(m => m.id === msg.id)) {
                msgs.push(msg);
                if (msgs.length > 200) msgs = msgs.slice(-200);
                localStorage.setItem(chave, JSON.stringify(msgs));
            }
        }

        function carregarMensagens() {
            const chave = 'wp_msgs_' + [eu.id, conversaAtual.id].sort().join('_');
            const msgs = JSON.parse(localStorage.getItem(chave) || '[]');
            document.getElementById('messagesArea').innerHTML = '';
            msgs.forEach(msg => mostrarMensagem(msg, msg.de === eu.id));
        }

        // ============ INTERFACE ============
        function fazerLogin() {
            const nome = document.getElementById('nameInput').value.trim();
            if (!nome || nome.length < 2) return alert('Digite um nome válido');

            eu = { id: 'u_' + Date.now(), nome: nome };
            localStorage.setItem('wp_user', JSON.stringify(eu));
            
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('meuNome').textContent = nome;
            document.getElementById('meuAvatar').textContent = nome.substr(0,2).toUpperCase();

            criarCanalPresenca();
            setTimeout(() => anunciarOnline(), 500);
        }

        function sair() {
            if (canalPresenca) {
                sb.removeChannel(canalPresenca);
                canalPresenca = null;
            }
            
            // Remover todos os canais de mensagens
            Object.values(canaisMensagens).forEach(ch => sb.removeChannel(ch));
            canaisMensagens = {};
            
            eu = null;
            conversaAtual = null;
            usuariosOnline = {};
            localStorage.removeItem('wp_user');
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('nameInput').value = '';
            fecharChat();
        }

        function atualizarLista() {
            document.getElementById('listaConversas').innerHTML = `
                <div class="empty-state">
                    <div class="icon">⏳</div>
                    <h3>Atualizando...</h3>
                </div>
            `;
            
            if (!canalPresenca && eu) {
                criarCanalPresenca();
            }
            
            if (canalPresenca) {
                anunciarOnline();
                canalPresenca.send({
                    type: 'broadcast',
                    event: 'ping_all',
                    payload: {}
                });
                
                setTimeout(() => renderizarLista(), 1500);
            }
        }

        function renderizarLista() {
            const container = document.getElementById('listaConversas');
            const users = Object.values(usuariosOnline).filter(u => u.id !== eu?.id);
            
            if (users.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">👥</div>
                        <h3>Nenhum contato online</h3>
                        <p>Abra em outro navegador e faça login</p>
                        <button onclick="atualizarLista()">🔄 Atualizar</button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = users.map(u => {
                const ultima = ultimaMensagem[u.id];
                return `
                    <div class="chat-item ${conversaAtual?.id === u.id ? 'active' : ''}" onclick="abrirConversa('${u.id}', '${u.nome}')">
                        <div class="user-avatar">
                            ${u.nome.substr(0,2).toUpperCase()}
                            <div class="online-dot"></div>
                        </div>
                        <div class="user-info">
                            <div class="user-name">${u.nome}</div>
                            <div class="user-status">${ultima ? ultima.texto.substr(0, 30) : 'Online'}</div>
                        </div>
                        <div class="user-time">${ultima ? new Date(ultima.time).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) : 'agora'}</div>
                    </div>
                `;
            }).join('');
        }

        function abrirConversa(userId, nome) {
            conversaAtual = { id: userId, nome: nome };
            
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('messagesArea').style.display = 'block';
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('chatName').textContent = nome;
            document.getElementById('chatAvatar').textContent = nome.substr(0,2).toUpperCase();
            document.getElementById('chatStatus').textContent = 'online';
            
            // Criar canal de mensagens para este usuário
            criarCanalMensagens(userId);
            
            // Carregar mensagens
            carregarMensagens();
            renderizarLista();
        }

        function fecharChat() {
            conversaAtual = null;
            document.getElementById('welcomeScreen').style.display = 'flex';
            document.getElementById('chatHeader').style.display = 'none';
            document.getElementById('messagesArea').style.display = 'none';
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('messagesArea').innerHTML = '';
        }

        // Eventos
        document.getElementById('msgInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') enviarMensagem();
        });

        document.getElementById('nameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') fazerLogin();
        });

        document.getElementById('msgInput').addEventListener('input', function() {
            const btn = document.getElementById('sendBtn');
            btn.textContent = this.value.trim() ? '➤' : '🎤';
            btn.style.color = this.value.trim() ? '#00a884' : '#54656f';
        });

        setInterval(() => { if (eu) anunciarOnline(); }, 30000);

        // Auto-login
        window.addEventListener('load', () => {
            const salvo = localStorage.getItem('wp_user');
            if (salvo) {
                eu = JSON.parse(salvo);
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('meuNome').textContent = eu.nome;
                document.getElementById('meuAvatar').textContent = eu.nome.substr(0,2).toUpperCase();
                criarCanalPresenca();
                setTimeout(() => anunciarOnline(), 500);
            }
        });
    </script>
</body>
</html>
