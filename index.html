<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat P2P</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background: #111b21;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: #111b21;
        }

        .login {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 30px;
            gap: 20px;
        }

        .login input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #2a3942;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .login button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #00a884;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .chat {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .header {
            background: #202c33;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header .back {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: none;
        }

        .header .title {
            flex: 1;
            font-size: 18px;
        }

        .header .exit {
            background: none;
            border: none;
            color: #8696a0;
            cursor: pointer;
        }

        .users {
            flex: 1;
            overflow-y: auto;
        }

        .user {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            border-bottom: 1px solid #202c33;
        }

        .user:active { background: #202c33; }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #0b141a;
            display: none;
        }

        .msg {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
        }

        .msg.sent { align-items: flex-end; }
        .msg.recv { align-items: flex-start; }

        .bubble {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 15px;
            word-wrap: break-word;
        }

        .msg.sent .bubble {
            background: #005c4b;
            border-radius: 10px 0 10px 10px;
        }

        .msg.recv .bubble {
            background: #202c33;
            border-radius: 0 10px 10px 10px;
        }

        .sender {
            font-size: 12px;
            color: #06cf9c;
            margin-bottom: 3px;
        }

        .time {
            font-size: 11px;
            color: #8696a0;
            margin-top: 3px;
            text-align: right;
        }

        .input-area {
            background: #202c33;
            padding: 10px 15px;
            display: none;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 20px;
            background: #2a3942;
            color: white;
            outline: none;
            font-size: 15px;
        }

        .input-area button {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #00a884;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
        }

        .empty {
            text-align: center;
            padding: 50px;
            color: #8696a0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LOGIN -->
        <div id="loginScreen" class="login">
            <h1>💬 Chat P2P</h1>
            <input type="text" id="nameInput" placeholder="Digite seu nome" maxlength="20">
            <button onclick="fazerLogin()">ENTRAR NO CHAT</button>
        </div>

        <!-- CHAT -->
        <div id="chatScreen" class="chat">
            <div class="header">
                <button class="back" id="btnVoltar" onclick="voltar()">←</button>
                <div class="title" id="titulo">Conversas</div>
                <button class="exit" onclick="sair()">Sair</button>
            </div>

            <div id="listaUsers" class="users">
                <div class="empty">🔍 Procurando usuários...</div>
            </div>

            <div id="mensagens" class="messages"></div>

            <div class="input-area" id="inputArea">
                <input type="text" id="msgInput" placeholder="Mensagem" maxlength="500">
                <button onclick="enviar()">➤</button>
            </div>
        </div>
    </div>

    <script>
        // ============ CONFIGURAÇÃO ============
        const SUPABASE_URL = 'https://fqbxhkcdefwsuefifygk.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_jC8Ntyx8QD2FHkP8Bqa63A_sLljd1Fj';
        
        // Criar conexão Supabase UMA ÚNICA VEZ
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Variáveis do app
        let eu = null;
        let conversa = null;
        let canal = null;
        let usuariosOnline = {};

        // ============ LOGIN ============
        function fazerLogin() {
            const nome = document.getElementById('nameInput').value.trim();
            
            if (!nome || nome.length < 2) {
                alert('Digite um nome com pelo menos 2 caracteres');
                return;
            }

            // Criar usuário
            eu = {
                id: 'u_' + Date.now(),
                nome: nome
            };

            // Salvar no navegador
            localStorage.setItem('chat_user', JSON.stringify(eu));

            // Mostrar tela do chat
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';
            document.getElementById('titulo').textContent = 'Conversas';

            // Mostrar lista de usuários
            mostrarLista();

            // Conectar presença
            conectarPresenca();

            // Anunciar que estou online
            setTimeout(anunciarOnline, 1000);
        }

        // ============ SAIR ============
        function sair() {
            if (canal) {
                sb.removeChannel(canal);
                canal = null;
            }
            eu = null;
            conversa = null;
            usuariosOnline = {};
            localStorage.removeItem('chat_user');
            
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('chatScreen').style.display = 'none';
            document.getElementById('nameInput').value = '';
        }

        // ============ PRESENÇA ============
        function conectarPresenca() {
            const ch = sb.channel('presenca_global');
            
            ch.on('broadcast', { event: 'online' }, (payload) => {
                const user = payload.payload;
                if (user.id !== eu?.id) {
                    usuariosOnline[user.id] = user;
                    renderizarUsuarios();
                }
            }).on('broadcast', { event: 'ping' }, () => {
                anunciarOnline();
            }).subscribe((status) => {
                if (status === 'SUBSCRIBED') {
                    console.log('✅ Canal de presença OK');
                    // Pedir usuários online
                    ch.send({
                        type: 'broadcast',
                        event: 'ping',
                        payload: {}
                    });
                }
            });
        }

        async function anunciarOnline() {
            if (!eu) return;
            
            try {
                const ch = sb.channel('presenca_global');
                await ch.subscribe();
                await ch.send({
                    type: 'broadcast',
                    event: 'online',
                    payload: {
                        id: eu.id,
                        nome: eu.nome,
                        time: Date.now()
                    }
                });
                setTimeout(() => sb.removeChannel(ch), 300);
            } catch(e) {
                console.log('Erro anunciar:', e);
            }
        }

        function renderizarUsuarios() {
            const container = document.getElementById('listaUsers');
            const users = Object.values(usuariosOnline).filter(u => u.id !== eu?.id);
            
            if (users.length === 0) {
                container.innerHTML = `
                    <div class="empty">
                        <p style="font-size:50px;">👥</p>
                        <p>Nenhum usuário online</p>
                        <p style="font-size:13px;">Abra em outro navegador</p>
                        <button onclick="atualizar()" style="margin-top:15px;padding:10px 20px;background:#00a884;border:none;color:white;border-radius:5px;cursor:pointer;">
                            🔄 Atualizar
                        </button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = users.map(u => `
                <div class="user" onclick="abrirConversa('${u.id}', '${u.nome}')">
                    <div class="avatar">${u.nome.substr(0,2).toUpperCase()}</div>
                    <div style="flex:1;">${u.nome}</div>
                    <div style="color:#00a884;font-size:12px;">online</div>
                </div>
            `).join('');
        }

        function atualizar() {
            document.getElementById('listaUsers').innerHTML = '<div class="empty">⏳ Atualizando...</div>';
            anunciarOnline();
            setTimeout(() => {
                const ch = sb.channel('presenca_global');
                ch.subscribe((status) => {
                    if (status === 'SUBSCRIBED') {
                        ch.send({
                            type: 'broadcast',
                            event: 'ping',
                            payload: {}
                        });
                        setTimeout(() => {
                            sb.removeChannel(ch);
                            renderizarUsuarios();
                        }, 1500);
                    }
                });
            }, 500);
        }

        // ============ INTERFACE ============
        function mostrarLista() {
            document.getElementById('listaUsers').style.display = 'block';
            document.getElementById('mensagens').style.display = 'none';
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('btnVoltar').style.display = 'none';
            document.getElementById('titulo').textContent = 'Conversas';
        }

        function mostrarChat() {
            document.getElementById('listaUsers').style.display = 'none';
            document.getElementById('mensagens').style.display = 'block';
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('btnVoltar').style.display = 'block';
        }

        // ============ CONVERSA ============
        function abrirConversa(userId, nome) {
            conversa = { id: userId, nome: nome };
            
            document.getElementById('titulo').textContent = nome;
            document.getElementById('mensagens').innerHTML = '';
            
            mostrarChat();
            carregarMensagens();
            conectarMensagens();
        }

        function voltar() {
            if (canal) {
                sb.removeChannel(canal);
                canal = null;
            }
            conversa = null;
            mostrarLista();
            renderizarUsuarios();
        }

        // ============ MENSAGENS ============
        function conectarMensagens() {
            if (canal) sb.removeChannel(canal);
            
            const nomeCanal = 'chat_' + [eu.id, conversa.id].sort().join('_');
            canal = sb.channel(nomeCanal);
            
            canal.on('broadcast', { event: 'msg' }, (payload) => {
                const msg = payload.payload;
                if (conversa && (msg.de === conversa.id || msg.para === conversa.id)) {
                    mostrarMensagem(msg, msg.de === eu.id);
                    salvarMensagem(msg);
                }
            }).subscribe();
        }

        async function enviar() {
            const input = document.getElementById('msgInput');
            const texto = input.value.trim();
            
            if (!texto || !conversa) return;
            
            const msg = {
                id: 'm_' + Date.now(),
                de: eu.id,
                deNome: eu.nome,
                para: conversa.id,
                texto: texto,
                hora: Date.now()
            };
            
            try {
                const nomeCanal = 'chat_' + [eu.id, conversa.id].sort().join('_');
                const ch = sb.channel(nomeCanal);
                await ch.subscribe();
                await ch.send({
                    type: 'broadcast',
                    event: 'msg',
                    payload: msg
                });
                setTimeout(() => sb.removeChannel(ch), 300);
                
                mostrarMensagem(msg, true);
                salvarMensagem(msg);
                input.value = '';
                input.focus();
            } catch(e) {
                console.log('Erro enviar:', e);
                mostrarMensagem(msg, true);
                salvarMensagem(msg);
                input.value = '';
            }
        }

        function mostrarMensagem(msg, enviada) {
            const container = document.getElementById('mensagens');
            const div = document.createElement('div');
            div.className = 'msg ' + (enviada ? 'sent' : 'recv');
            
            const hora = new Date(msg.hora).toLocaleTimeString('pt-BR', {
                hour: '2-digit',
                minute: '2-digit'
            });
            
            div.innerHTML = `
                ${!enviada ? `<div class="sender">${msg.deNome}</div>` : ''}
                <div class="bubble">${msg.texto}</div>
                <div class="time">${hora}</div>
            `;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function salvarMensagem(msg) {
            const chave = 'msgs_' + [msg.de, msg.para].sort().join('_');
            let msgs = JSON.parse(localStorage.getItem(chave) || '[]');
            
            if (!msgs.find(m => m.id === msg.id)) {
                msgs.push(msg);
                if (msgs.length > 100) msgs = msgs.slice(-100);
                localStorage.setItem(chave, JSON.stringify(msgs));
            }
        }

        function carregarMensagens() {
            const chave = 'msgs_' + [eu.id, conversa.id].sort().join('_');
            const msgs = JSON.parse(localStorage.getItem(chave) || '[]');
            
            msgs.forEach(msg => {
                mostrarMensagem(msg, msg.de === eu.id);
            });
        }

        // ============ EVENTOS ============
        document.getElementById('msgInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') enviar();
        });

        document.getElementById('nameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') fazerLogin();
        });

        // Manter online
        setInterval(() => {
            if (eu) anunciarOnline();
        }, 30000);

        // Auto-login
        window.addEventListener('load', function() {
            const salvo = localStorage.getItem('chat_user');
            if (salvo) {
                try {
                    eu = JSON.parse(salvo);
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('chatScreen').style.display = 'flex';
                    document.getElementById('titulo').textContent = 'Conversas';
                    mostrarLista();
                    conectarPresenca();
                    setTimeout(anunciarOnline, 1000);
                } catch(e) {
                    localStorage.removeItem('chat_user');
                }
            }
        });
    </script>
</body>
</html>
