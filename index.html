<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #dddbd2;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app {
            width: 100%;
            max-width: 1400px;
            height: 100vh;
            background: #fff;
            display: flex;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 420px;
            min-width: 420px;
            border-right: 1px solid #e9edef;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .sidebar-header {
            background: #f0f2f5;
            padding: 10px 16px;
            height: 59px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #e9edef;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #dfe5e7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 500;
            color: #54656f;
            flex-shrink: 0;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-size: 16px;
            color: #111b21;
            font-weight: 500;
        }

        .btn-refresh {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #00a884;
            color: white;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
            transition: 0.2s;
        }

        .btn-refresh:hover { background: #008f72; transform: rotate(180deg); }

        .btn-logout {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: none;
            font-size: 18px;
            cursor: pointer;
            color: #ea0038;
            flex-shrink: 0;
        }

        .btn-logout:hover { background: #fce4ec; }

        .search-box {
            padding: 7px 12px;
            background: #fff;
            border-bottom: 1px solid #e9edef;
        }

        .search-box input {
            width: 100%;
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            background: #f0f2f5;
            font-size: 14px;
            outline: none;
            color: #111b21;
        }

        .search-box input::placeholder { color: #667781; }

        .contact-list {
            flex: 1;
            overflow-y: auto;
        }

        .contact-list::-webkit-scrollbar { width: 6px; }
        .contact-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

        .contact-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            border-bottom: 1px solid #f5f6f6;
            transition: 0.15s;
        }

        .contact-item:hover { background: #f5f6f6; }
        .contact-item.active { background: #f0f2f5; }

        .contact-avatar {
            width: 49px;
            height: 49px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 19px;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
            position: relative;
        }

        .online-dot {
            width: 12px;
            height: 12px;
            background: #25d366;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            bottom: 1px;
            right: 1px;
        }

        .contact-info { flex: 1; min-width: 0; }

        .contact-name {
            font-size: 16px;
            color: #111b21;
            font-weight: 500;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-last {
            font-size: 13px;
            color: #667781;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-time {
            font-size: 12px;
            color: #667781;
            flex-shrink: 0;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: #667781;
            padding: 40px;
        }

        .empty-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.8; }
        .empty-title { font-size: 18px; color: #111b21; margin-bottom: 10px; font-weight: 500; }
        .empty-text { font-size: 14px; margin-bottom: 20px; line-height: 20px; }

        .empty-btn {
            background: #00a884;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .empty-btn:hover { background: #008f72; }

        /* ========== CHAT PRINCIPAL ========== */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #efeae2;
        }

        .chat-header {
            background: #f0f2f5;
            padding: 10px 16px;
            height: 59px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #e9edef;
        }

        .btn-back {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            background: none;
            font-size: 22px;
            cursor: pointer;
            color: #54656f;
            display: none;
        }

        .btn-back:hover { background: #d9dbdd; }

        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }

        .chat-header-info { flex: 1; min-width: 0; }
        .chat-header-name { font-size: 16px; font-weight: 500; color: #111b21; }
        .chat-header-status { font-size: 13px; color: #667781; }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 60px;
        }

        .messages-area::-webkit-scrollbar { width: 6px; }
        .messages-area::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }

        .msg {
            margin-bottom: 3px;
            display: flex;
            flex-direction: column;
        }

        .msg.sent { align-items: flex-end; }
        .msg.received { align-items: flex-start; }

        .msg-bubble {
            max-width: 65%;
            padding: 6px 7px 6px 9px;
            border-radius: 7.5px;
            font-size: 14.2px;
            line-height: 19px;
            word-wrap: break-word;
            box-shadow: 0 1px 0.5px rgba(11,20,26,0.13);
        }

        .msg.sent .msg-bubble {
            background: #d9fdd3;
            border-radius: 7.5px 0 7.5px 7.5px;
        }

        .msg.received .msg-bubble {
            background: #ffffff;
            border-radius: 0 7.5px 7.5px 7.5px;
        }

        .msg-sender {
            font-size: 12.8px;
            color: #53bdeb;
            margin-bottom: 2px;
            font-weight: 500;
        }

        .msg-time {
            font-size: 11px;
            color: #667781;
            float: right;
            margin-left: 8px;
            margin-top: -8px;
        }

        .msg.sent .msg-time { color: #8696a0; }

        .input-bar {
            background: #f0f2f5;
            padding: 5px 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .input-bar input {
            flex: 1;
            padding: 9px 12px;
            border: none;
            border-radius: 8px;
            background: #fff;
            font-size: 15px;
            outline: none;
            color: #111b21;
        }

        .input-bar input::placeholder { color: #667781; }

        .input-bar button {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: none;
            font-size: 22px;
            cursor: pointer;
            color: #54656f;
            flex-shrink: 0;
        }

        .input-bar button:hover { background: #d9dbdd; }
        .input-bar .send-btn.active { color: #00a884; }

        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f0f2f5;
            border-bottom: 6px solid #25d366;
        }

        .welcome-icon {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #25d366, #00a884);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,168,132,0.3);
        }

        .welcome-title { font-size: 32px; font-weight: 300; color: #41525d; margin-bottom: 15px; }
        .welcome-text { font-size: 14px; color: #667781; text-align: center; line-height: 22px; }

        /* ========== LOGIN MODAL ========== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal-box {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-box h2 {
            font-size: 22px;
            color: #111b21;
            margin-bottom: 25px;
            font-weight: 400;
            text-align: center;
        }

        .modal-box input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
            color: #111b21;
            transition: 0.2s;
        }

        .modal-box input:focus { border-color: #00a884; }

        .modal-box button {
            width: 100%;
            padding: 14px;
            background: #00a884;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-box button:hover { background: #008f72; }
        .modal-box .error-msg { color: #ea0038; font-size: 13px; text-align: center; margin-top: 10px; display: none; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; min-width: 100%; }
            .main-chat { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100; }
            .main-chat.active { display: flex; }
            .btn-back { display: block; }
            .messages-area { padding: 15px; }
            .msg-bubble { max-width: 85%; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="avatar" id="myAvatar">👤</div>
                <div class="user-info">
                    <div class="user-name" id="myName">WhatsApp</div>
                </div>
                <button class="btn-refresh" onclick="refreshContacts()" title="Atualizar">🔄</button>
                <button class="btn-logout" onclick="logout()" title="Sair">⏻</button>
            </div>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Pesquisar conversa" oninput="filterContacts()">
            </div>

            <div class="contact-list" id="contactList">
                <div class="empty-state">
                    <div class="empty-icon">💬</div>
                    <div class="empty-title">WhatsApp Web</div>
                    <div class="empty-text">Clique em atualizar para<br>encontrar contatos online</div>
                    <button class="empty-btn" onclick="refreshContacts()">🔄 Buscar Contatos</button>
                </div>
            </div>
        </div>

        <!-- CHAT PRINCIPAL -->
        <div class="main-chat" id="mainChat">
            <div class="chat-header" id="chatHeader" style="display:none;">
                <button class="btn-back" onclick="closeChat()">←</button>
                <div class="chat-avatar" id="chatAvatar">👤</div>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="chatName">Nome</div>
                    <div class="chat-header-status" id="chatStatus">online</div>
                </div>
            </div>

            <div class="messages-area" id="messagesArea"></div>

            <div class="input-bar" id="inputBar" style="display:none;">
                <button>😀</button>
                <input type="text" id="msgInput" placeholder="Digite uma mensagem" maxlength="1000" autocomplete="off">
                <button class="send-btn" id="sendBtn" onclick="sendMsg()">🎤</button>
            </div>
        </div>

        <!-- WELCOME -->
        <div class="welcome-screen" id="welcomeScreen">
            <div class="welcome-icon">💬</div>
            <div class="welcome-title">WhatsApp Web</div>
            <div class="welcome-text">Envie e receba mensagens em tempo real.<br>Suas mensagens não são armazenadas.</div>
        </div>
    </div>

    <!-- LOGIN MODAL -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal-box">
            <h2>👋 Bem-vindo</h2>
            <input type="text" id="nameInput" placeholder="Digite seu nome" maxlength="25" autocomplete="off">
            <button onclick="doLogin()">Entrar no WhatsApp</button>
            <div class="error-msg" id="loginError">Digite um nome válido (mínimo 2 caracteres)</div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURAÇÃO ====================
        const SUPABASE_URL = 'https://fqbxhkcdefwsuefifygk.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_jC8Ntyx8QD2FHkP8Bqa63A_sLljd1Fj';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let activeChat = null;
        let presenceChannel = null;
        let msgChannels = {};
        let onlineUsers = {};
        let lastMsgs = {};

        console.log('✅ App iniciado!');

        // ==================== LOGIN ====================
        function doLogin() {
            const name = document.getElementById('nameInput').value.trim();
            const errorEl = document.getElementById('loginError');
            
            if (!name || name.length < 2) {
                errorEl.style.display = 'block';
                return;
            }
            
            errorEl.style.display = 'none';

            currentUser = {
                id: 'u_' + Date.now(),
                name: name,
                color: getColor()
            };

            // Salvar
            localStorage.setItem('wp_user', JSON.stringify(currentUser));
            
            // Esconder modal
            document.getElementById('loginModal').style.display = 'none';
            
            // Atualizar sidebar
            document.getElementById('myName').textContent = name;
            document.getElementById('myAvatar').textContent = getInitials(name);
            document.getElementById('myAvatar').style.background = currentUser.color;

            console.log('✅ Login:', name);

            // Conectar presença
            connectPresence();
            
            // Anunciar
            setTimeout(() => announcePresence(), 500);
            setTimeout(() => requestUsers(), 1500);
        }

        function logout() {
            // Limpar canais
            if (presenceChannel) {
                sb.removeChannel(presenceChannel);
                presenceChannel = null;
            }
            Object.values(msgChannels).forEach(ch => {
                sb.removeChannel(ch);
            });
            msgChannels = {};
            
            currentUser = null;
            activeChat = null;
            onlineUsers = {};
            lastMsgs = {};
            
            localStorage.removeItem('wp_user');
            
            document.getElementById('loginModal').style.display = 'flex';
            document.getElementById('nameInput').value = '';
            document.getElementById('myName').textContent = 'WhatsApp';
            document.getElementById('myAvatar').textContent = '👤';
            document.getElementById('myAvatar').style.background = '#dfe5e7';
            
            closeChat();
            showEmptyContacts();
        }

        // ==================== PRESENÇA ====================
        function connectPresence() {
            if (presenceChannel) {
                sb.removeChannel(presenceChannel);
            }
            
            console.log('📡 Conectando presença...');
            
            presenceChannel = sb.channel('presence_v3', {
                config: { broadcast: { self: true } }
            });

            presenceChannel
                .on('broadcast', { event: 'user_online' }, (payload) => {
                    const user = payload.payload;
                    if (user.id !== currentUser?.id) {
                        console.log('👤 Usuário online:', user.name);
                        onlineUsers[user.id] = user;
                        renderContacts();
                    }
                })
                .on('broadcast', { event: 'request_users' }, () => {
                    if (currentUser) announcePresence();
                })
                .subscribe((status) => {
                    if (status === 'SUBSCRIBED') {
                        console.log('✅ Presença conectada!');
                        requestUsers();
                    } else {
                        console.log('📊 Status presença:', status);
                    }
                });
        }

        function announcePresence() {
            if (!currentUser || !presenceChannel) return;
            
            console.log('📢 Anunciando:', currentUser.name);
            
            presenceChannel.send({
                type: 'broadcast',
                event: 'user_online',
                payload: {
                    id: currentUser.id,
                    name: currentUser.name,
                    color: currentUser.color,
                    timestamp: Date.now()
                }
            });
        }

        function requestUsers() {
            if (!presenceChannel) return;
            
            presenceChannel.send({
                type: 'broadcast',
                event: 'request_users',
                payload: {}
            });
            
            setTimeout(() => renderContacts(), 2000);
        }

        function refreshContacts() {
            document.getElementById('contactList').innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-title">Atualizando...</div></div>';
            announcePresence();
            requestUsers();
        }

        // ==================== LISTA DE CONTATOS ====================
        function renderContacts(filter = '') {
            const container = document.getElementById('contactList');
            let users = Object.values(onlineUsers).filter(u => u.id !== currentUser?.id);
            
            if (filter) {
                users = users.filter(u => u.name.toLowerCase().includes(filter.toLowerCase()));
            }

            if (users.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">👥</div>
                        <div class="empty-title">${filter ? 'Nenhum resultado' : 'Nenhum contato online'}</div>
                        <div class="empty-text">
                            ${filter ? 'Tente outro nome' : 'Abra em outro navegador e faça login'}
                        </div>
                        ${!filter ? '<button class="empty-btn" onclick="refreshContacts()">🔄 Atualizar</button>' : ''}
                    </div>
                `;
                return;
            }

            container.innerHTML = users.map(user => {
                const last = lastMsgs[user.id];
                const time = last ? formatTime(last.timestamp) : 'agora';
                
                return `
                    <div class="contact-item ${activeChat?.id === user.id ? 'active' : ''}" 
                         onclick="openChat('${user.id}', '${escapeHtml(user.name)}', '${escapeHtml(user.color || '')}')">
                        <div class="contact-avatar" style="background:${user.color || 'linear-gradient(135deg, #667eea, #764ba2)'};">
                            ${getInitials(user.name)}
                            <div class="online-dot"></div>
                        </div>
                        <div class="contact-info">
                            <div class="contact-name">${escapeHtml(user.name)}</div>
                            <div class="contact-last">${last ? last.text.substring(0, 40) : 'Online agora'}</div>
                        </div>
                        <div class="contact-time">${time}</div>
                    </div>
                `;
            }).join('');
        }

        function filterContacts() {
            renderContacts(document.getElementById('searchInput').value);
        }

        function showEmptyContacts() {
            document.getElementById('contactList').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">💬</div>
                    <div class="empty-title">WhatsApp Web</div>
                    <div class="empty-text">Clique em atualizar para<br>encontrar contatos online</div>
                    <button class="empty-btn" onclick="refreshContacts()">🔄 Buscar Contatos</button>
                </div>
            `;
        }

        // ==================== CHAT ====================
        function openChat(userId, userName, userColor) {
            activeChat = { id: userId, name: userName, color: userColor };
            
            // Mostrar chat
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('messagesArea').style.display = 'block';
            document.getElementById('inputBar').style.display = 'flex';
            
            document.getElementById('chatName').textContent = userName;
            document.getElementById('chatStatus').textContent = 'online';
            document.getElementById('chatAvatar').textContent = getInitials(userName);
            document.getElementById('chatAvatar').style.background = userColor || 'linear-gradient(135deg, #667eea, #764ba2)';
            
            document.getElementById('messagesArea').innerHTML = '';
            
            // Criar canal de mensagens
            createMsgChannel(userId);
            
            // Carregar mensagens
            loadMessages();
            
            // Mobile
            if (window.innerWidth <= 768) {
                document.getElementById('mainChat').classList.add('active');
            }
            
            renderContacts();
        }

        function closeChat() {
            activeChat = null;
            
            document.getElementById('welcomeScreen').style.display = 'flex';
            document.getElementById('chatHeader').style.display = 'none';
            document.getElementById('messagesArea').style.display = 'none';
            document.getElementById('inputBar').style.display = 'none';
            document.getElementById('messagesArea').innerHTML = '';
            
            if (window.innerWidth <= 768) {
                document.getElementById('mainChat').classList.remove('active');
            }
            
            renderContacts();
        }

        // ==================== MENSAGENS ====================
        function createMsgChannel(userId) {
            if (msgChannels[userId]) return;
            
            const channelName = 'chat_' + [currentUser.id, userId].sort().join('_');
            console.log('📡 Criando canal:', channelName);
            
            const channel = sb.channel(channelName);
            
            channel.on('broadcast', { event: 'msg' }, (payload) => {
                const msg = payload.payload;
                console.log('📨 Recebido:', msg.text);
                
                // Salvar
                saveMessage(msg);
                
                // Atualizar última mensagem
                const otherId = msg.from === currentUser.id ? msg.to : msg.from;
                lastMsgs[otherId] = { text: msg.text, timestamp: msg.timestamp };
                
                // Mostrar se for do chat ativo
                if (activeChat && (msg.from === activeChat.id || msg.to === activeChat.id)) {
                    displayMessage(msg, msg.from === currentUser.id);
                }
                
                renderContacts();
            }).subscribe((status) => {
                if (status === 'SUBSCRIBED') {
                    console.log('✅ Canal mensagens ativo:', channelName);
                }
            });
            
            msgChannels[userId] = channel;
        }

        async function sendMsg() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            
            if (!text || !activeChat) return;
            
            const msg = {
                id: 'msg_' + Date.now(),
                from: currentUser.id,
                fromName: currentUser.name,
                to: activeChat.id,
                text: text,
                timestamp: Date.now()
            };
            
            console.log('📤 Enviando:', text);
            
            // Mostrar na tela
            displayMessage(msg, true);
            saveMessage(msg);
            lastMsgs[activeChat.id] = { text: text, timestamp: msg.timestamp };
            input.value = '';
            updateSendBtn();
            
            // Enviar broadcast
            const channelName = 'chat_' + [currentUser.id, activeChat.id].sort().join('_');
            
            try {
                const ch = sb.channel(channelName);
                ch.subscribe(async (status) => {
                    if (status === 'SUBSCRIBED') {
                        await ch.send({
                            type: 'broadcast',
                            event: 'msg',
                            payload: msg
                        });
                        console.log('✅ Mensagem enviada!');
                        setTimeout(() => sb.removeChannel(ch), 300);
                    }
                });
            } catch(e) {
                console.error('Erro envio:', e);
            }
            
            renderContacts();
        }

        function displayMessage(msg, sent) {
            const container = document.getElementById('messagesArea');
            const div = document.createElement('div');
            div.className = 'msg ' + (sent ? 'sent' : 'received');
            
            const time = formatTime(msg.timestamp);
            
            div.innerHTML = `
                ${!sent ? `<div class="msg-sender">~${escapeHtml(msg.fromName)}</div>` : ''}
                <div class="msg-bubble">
                    ${escapeHtml(msg.text)}
                    <span class="msg-time">${time}</span>
                </div>
            `;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function saveMessage(msg) {
            const key = 'wp_msgs_' + [msg.from, msg.to].sort().join('_');
            let msgs = JSON.parse(localStorage.getItem(key) || '[]');
            
            if (!msgs.find(m => m.id === msg.id)) {
                msgs.push(msg);
                if (msgs.length > 300) msgs = msgs.slice(-300);
                localStorage.setItem(key, JSON.stringify(msgs));
            }
        }

        function loadMessages() {
            if (!activeChat) return;
            
            const key = 'wp_msgs_' + [currentUser.id, activeChat.id].sort().join('_');
            const msgs = JSON.parse(localStorage.getItem(key) || '[]');
            
            document.getElementById('messagesArea').innerHTML = '';
            msgs.forEach(msg => {
                displayMessage(msg, msg.from === currentUser.id);
            });
        }

        // ==================== UTILITÁRIOS ====================
        function getInitials(name) {
            return name.split(' ').map(w => w[0]).filter(Boolean).slice(0, 2).join('').toUpperCase() || '?';
        }

        function getColor() {
            const colors = [
                'linear-gradient(135deg, #667eea, #764ba2)',
                'linear-gradient(135deg, #f093fb, #f5576c)',
                'linear-gradient(135deg, #4facfe, #00f2fe)',
                'linear-gradient(135deg, #43e97b, #38f9d7)',
                'linear-gradient(135deg, #fa709a, #fee140)',
                'linear-gradient(135deg, #a18cd1, #fbc2eb)'
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function formatTime(ts) {
            const d = new Date(ts);
            return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateSendBtn() {
            const btn = document.getElementById('sendBtn');
            const input = document.getElementById('msgInput');
            
            if (input.value.trim()) {
                btn.textContent = '➤';
                btn.classList.add('active');
            } else {
                btn.textContent = '🎤';
                btn.classList.remove('active');
            }
        }

        // ==================== EVENTOS ====================
        document.getElementById('msgInput').addEventListener('input', updateSendBtn);

        document.getElementById('msgInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMsg();
        });

        document.getElementById('nameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doLogin();
        });

        // Manter presença
        setInterval(() => {
            if (currentUser) announcePresence();
        }, 25000);

        // Auto-login
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('wp_user');
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                    console.log('🔄 Auto-login:', currentUser.name);
                    
                    document.getElementById('loginModal').style.display = 'none';
                    document.getElementById('myName').textContent = currentUser.name;
                    document.getElementById('myAvatar').textContent = getInitials(currentUser.name);
                    document.getElementById('myAvatar').style.background = currentUser.color;
                    
                    connectPresence();
                    setTimeout(() => announcePresence(), 500);
                    setTimeout(() => requestUsers(), 1500);
                } catch(e) {
                    console.error('Erro auto-login:', e);
                    localStorage.removeItem('wp_user');
                }
            }
        });

        console.log('✅ Sistema pronto!');
    </script>
</body>
</html>
