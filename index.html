<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp P2P</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a1014;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            max-height: 900px;
            background: #111b21;
            display: flex;
            flex-direction: column;
            color: white;
        }

        .login {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 30px;
            gap: 20px;
        }

        .login input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #2a3942;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .login button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #00a884;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .chat {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .header {
            background: #202c33;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #0b141a;
        }

        .msg {
            margin-bottom: 5px;
            display: flex;
            flex-direction: column;
        }

        .msg.sent { align-items: flex-end; }
        .msg.received { align-items: flex-start; }

        .msg-bubble {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            word-wrap: break-word;
        }

        .msg.sent .msg-bubble {
            background: #005c4b;
            border-radius: 8px 0 8px 8px;
        }

        .msg.received .msg-bubble {
            background: #202c33;
            border-radius: 0 8px 8px 8px;
        }

        .msg-sender {
            font-size: 12px;
            color: #06cf9c;
            margin-bottom: 2px;
        }

        .msg-time {
            font-size: 11px;
            color: #8696a0;
            margin-top: 2px;
            text-align: right;
        }

        .input-area {
            background: #202c33;
            padding: 10px 15px;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 24px;
            background: #2a3942;
            color: white;
            outline: none;
        }

        .input-area button {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #00a884;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .users {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-item {
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            border-bottom: 1px solid #202c33;
        }

        .user-item:hover { background: #202c33; }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }

        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Login -->
        <div id="loginScreen" class="login">
            <h2>💬 WhatsApp P2P</h2>
            <input type="text" id="nameInput" placeholder="Seu nome" maxlength="20">
            <button onclick="login()">Entrar</button>
            <p style="color: #8696a0; font-size: 12px;">Mensagens diretas • Sem armazenamento</p>
        </div>

        <!-- Chat -->
        <div id="chatScreen" class="chat">
            <div class="header">
                <button class="back-btn" id="backBtn" onclick="goBack()">←</button>
                <div class="user-avatar" id="chatAvatar" style="width:40px;height:40px;font-size:16px;">👤</div>
                <div>
                    <div id="chatName" style="font-weight:500;">Conversas</div>
                    <div id="chatStatus" style="font-size:12px;color:#8696a0;">online</div>
                </div>
                <button onclick="logout()" style="margin-left:auto;background:none;border:none;color:#8696a0;cursor:pointer;">Sair</button>
            </div>

            <div id="usersList" class="users"></div>
            <div id="messagesContainer" class="messages" style="display:none;"></div>

            <div id="inputArea" class="input-area" style="display:none;">
                <input type="text" id="messageInput" placeholder="Mensagem" maxlength="1000">
                <button onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        // Configuração
        const SUPABASE_URL = 'https://fqbxhkcdefwsuefifygk.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_jC8Ntyx8QD2FHkP8Bqa63A_sLljd1Fj';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let currentChat = null;
        let messageChannel = null;
        let onlineUsers = new Map();

        // Login
        async function login() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name || name.length < 2) return alert('Digite um nome (mínimo 2 caracteres)');
            
            currentUser = {
                id: 'user_' + btoa(name).substring(0, 20),
                name: name
            };
            
            localStorage.setItem('chat_user', JSON.stringify(currentUser));
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';
            document.getElementById('chatName').textContent = 'Conversas';
            
            await announcePresence();
            subscribePresence();
            requestUsers();
        }

        function logout() {
            currentUser = null;
            currentChat = null;
            if (messageChannel) supabase.removeChannel(messageChannel);
            localStorage.removeItem('chat_user');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('chatScreen').style.display = 'none';
            showUsers();
        }

        // Presença via Broadcast
        async function announcePresence() {
            try {
                const ch = supabase.channel('presence');
                await ch.subscribe();
                await ch.send({
                    type: 'broadcast',
                    event: 'user_online',
                    payload: { user_id: currentUser.id, name: currentUser.name }
                });
                await new Promise(r => setTimeout(r, 100));
                supabase.removeChannel(ch);
            } catch(e) {
                console.log('Presença via broadcast:', e);
            }
        }

        function subscribePresence() {
            const ch = supabase.channel('presence');
            ch.on('broadcast', { event: 'user_online' }, (payload) => {
                if (payload.payload.user_id !== currentUser?.id) {
                    onlineUsers.set(payload.payload.user_id, payload.payload);
                    if (!currentChat) renderUsers();
                }
            }).on('broadcast', { event: 'request_users' }, async () => {
                await announcePresence();
            }).subscribe();
        }

        async function requestUsers() {
            try {
                const ch = supabase.channel('presence');
                await ch.subscribe();
                await ch.send({
                    type: 'broadcast',
                    event: 'request_users',
                    payload: { user_id: currentUser.id }
                });
                await new Promise(r => setTimeout(r, 800));
                supabase.removeChannel(ch);
                renderUsers();
            } catch(e) {
                console.log('Request users:', e);
            }
        }

        function renderUsers() {
            const container = document.getElementById('usersList');
            const users = Array.from(onlineUsers.values()).filter(u => u.user_id !== currentUser?.id);
            
            if (users.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#8696a0;">Nenhum usuário online</div>';
                return;
            }
            
            container.innerHTML = users.map(u => `
                <div class="user-item" onclick="openChat('${u.user_id}', '${u.name}')">
                    <div class="user-avatar">${u.name.substring(0,2).toUpperCase()}</div>
                    <div style="color:white;">${u.name}</div>
                    <div style="margin-left:auto;color:#00a884;font-size:12px;">online</div>
                </div>
            `).join('');
        }

        // Chat
        function openChat(userId, userName) {
            currentChat = { id: userId, name: userName };
            document.getElementById('usersList').style.display = 'none';
            document.getElementById('messagesContainer').style.display = 'block';
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('backBtn').style.display = 'block';
            document.getElementById('chatName').textContent = userName;
            document.getElementById('chatAvatar').textContent = userName.substring(0,2).toUpperCase();
            
            document.getElementById('messagesContainer').innerHTML = '';
            loadMessages();
            subscribeMessages();
        }

        function goBack() {
            currentChat = null;
            if (messageChannel) {
                supabase.removeChannel(messageChannel);
                messageChannel = null;
            }
            showUsers();
            renderUsers();
        }

        function showUsers() {
            document.getElementById('usersList').style.display = 'block';
            document.getElementById('messagesContainer').style.display = 'none';
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
            document.getElementById('chatName').textContent = 'Conversas';
            document.getElementById('chatAvatar').textContent = '👤';
        }

        // Mensagens
        function subscribeMessages() {
            if (messageChannel) supabase.removeChannel(messageChannel);
            
            const channelName = 'chat_' + [currentUser.id, currentChat.id].sort().join('_');
            messageChannel = supabase.channel(channelName);
            
            messageChannel.on('broadcast', { event: 'msg' }, (payload) => {
                displayMessage(payload.payload, payload.payload.from === currentUser.id);
                saveMessage(payload.payload);
            }).subscribe();
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentChat) return;
            
            const msg = {
                id: Date.now().toString(),
                from: currentUser.id,
                fromName: currentUser.name,
                to: currentChat.id,
                text: text,
                time: Date.now()
            };
            
            try {
                const channelName = 'chat_' + [currentUser.id, currentChat.id].sort().join('_');
                await supabase.channel(channelName).send({
                    type: 'broadcast',
                    event: 'msg',
                    payload: msg
                });
                
                displayMessage(msg, true);
                saveMessage(msg);
                input.value = '';
                input.focus();
            } catch(e) {
                console.error('Erro ao enviar:', e);
            }
        }

        function displayMessage(msg, isSent) {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.className = `msg ${isSent ? 'sent' : 'received'}`;
            
            const time = new Date(msg.time).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
            
            div.innerHTML = `
                ${!isSent ? `<div class="msg-sender">${msg.fromName}</div>` : ''}
                <div class="msg-bubble">${msg.text}</div>
                <div class="msg-time">${time}</div>
            `;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function saveMessage(msg) {
            const key = 'chat_' + [msg.from, msg.to].sort().join('_');
            let msgs = JSON.parse(localStorage.getItem(key) || '[]');
            if (!msgs.find(m => m.id === msg.id)) {
                msgs.push(msg);
                if (msgs.length > 100) msgs = msgs.slice(-100);
                localStorage.setItem(key, JSON.stringify(msgs));
            }
        }

        function loadMessages() {
            const key = 'chat_' + [currentUser.id, currentChat.id].sort().join('_');
            const msgs = JSON.parse(localStorage.getItem(key) || '[]');
            msgs.forEach(msg => {
                displayMessage(msg, msg.from === currentUser.id);
            });
        }

        // Enter para enviar
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Auto-login
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('chat_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('chatScreen').style.display = 'flex';
                document.getElementById('chatName').textContent = 'Conversas';
                announcePresence();
                subscribePresence();
                requestUsers();
            }
        });

        // Manter presença
        setInterval(() => {
            if (currentUser) announcePresence();
        }, 25000);
    </script>
</body>
</html>
